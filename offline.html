<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pastimez | Offline</title>
  <meta name="theme-color" content="#6a1b9a">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7fb;
      color: #222;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 1.5rem;
      text-align: center;
    }

    .card {
      max-width: 520px;
      width: 100%;
      background: white;
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      color: #6a1b9a;
    }

    p {
      line-height: 1.6;
      margin-bottom: 1rem;
    }

    a {
      display: inline-block;
      margin-top: 0.5rem;
      text-decoration: none;
      background: #6a1b9a;
      color: white;
      padding: 0.85rem 1.2rem;
      border-radius: 999px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>You’re offline</h1>
    <p>Pastimez can still open, but live map data and hobby search results need a connection.</p>
    <p>Once you’re back online, reopen the app or tap below to try again.</p>
    <a href="/">Try again</a>
  </main>
</body>
</html>
